services:
  db:
    image: postgres:16-alpine
    container_name: grantcare-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: grantcare
      POSTGRES_USER: grantcare
      POSTGRES_PASSWORD: grantcare
    ports:
      - "54339:5432"
    volumes:
      - grantcare-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grantcare -d grantcare"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  grantcare-postgres-data:
